name: Deploy to Production

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  DEPLOYMENT_TIMEOUT: 600

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region us-east-1

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/sitegenie-api sitegenie-api=${{ env.REGISTRY }}/${{ github.repository }}/api:${{ github.sha }} \
            -n sitegenie
          kubectl set image deployment/sitegenie-workers sitegenie-workers=${{ env.REGISTRY }}/${{ github.repository }}/workers:${{ github.sha }} \
            -n sitegenie
          kubectl rollout status deployment/sitegenie-api -n sitegenie --timeout=5m
          kubectl rollout status deployment/sitegenie-workers -n sitegenie --timeout=5m

      - name: Run smoke tests
        run: |
          API_URL=$(kubectl get service sitegenie-api -n sitegenie -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          for i in {1..10}; do
            curl -f http://$API_URL/health && echo "Health check passed" && break
            echo "Attempt $i failed, retrying..."
            sleep 5
          done

      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Deployment to production: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Deployment Status: *${{ job.status }}*\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
