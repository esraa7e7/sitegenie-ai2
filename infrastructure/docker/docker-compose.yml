version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sitegenie-postgres
    environment:
      POSTGRES_DB: sitegenie
      POSTGRES_USER: sitegenie
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitegenie"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sitegenie-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Server
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: sitegenie-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://sitegenie:${DB_PASSWORD:-changeme}@postgres:5432/sitegenie
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Frontend
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
    container_name: sitegenie-web
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    environment:
      VITE_API_URL: http://api:3000

  # Worker Pool
  workers:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.workers
    container_name: sitegenie-workers
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://sitegenie:${DB_PASSWORD:-changeme}@postgres:5432/sitegenie
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: sitegenie-network
