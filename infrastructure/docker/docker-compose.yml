version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sitegenie-postgres
    environment:
      POSTGRES_DB: sitegenie
      POSTGRES_USER: sitegenie
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitegenie"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sitegenie-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: sitegenie-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://sitegenie:${DB_PASSWORD:-changeme}@postgres:5432/sitegenie
      REDIS_URL: redis://redis:6379
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
    container_name: sitegenie-web
    ports:
      - "80:80"
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3000 # للمتصفح، استخدم localhost أو الدومين

  workers:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.workers
    container_name: sitegenie-workers
    environment:
      DATABASE_URL: postgresql://sitegenie:${DB_PASSWORD:-changeme}@postgres:5432/sitegenie
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: sitegenie-network