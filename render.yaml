services:
  # Backend API Service
  - type: web
    name: sitegenie-api
    runtime: node
    plan: free
    buildCommand: |
      npm install --legacy-peer-deps --no-audit --no-fund
      npm run build:server
    startCommand: npm run start:server
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: NPM_VERSION
        value: 11.0.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: E2B_API_KEY
        sync: false

  # Frontend Static Service  
  - type: web
    name: sitegenie-frontend
    runtime: static
    plan: free
    buildCommand: |
      cd apps/frontend
      npm install --legacy-peer-deps --no-audit --no-fund
      npm run build
    publishDir: apps/frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: NPM_VERSION
        value: 11.0.0
      - key: VITE_API_URL
        fromService:
          type: web
          name: sitegenie-api
          property: host